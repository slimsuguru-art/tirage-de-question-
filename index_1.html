<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tirage — question du jour</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<!-- Firebase (stockage anonyme partagé, gratuit) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
  :root{
    --bg:#1F1730;
    --card:#2A2140;
    --card-edge:#352A4D;
    --marigold:#F4B740;
    --marigold-dim:#D9A233;
    --coral:#FF6B5B;
    --ink:#F3ECE0;
    --ink-dim:#B6A8CE;
    --hole:#1F1730;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Work Sans', sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 16px;
  }
  .wrap{width:100%; max-width:460px;}
  .eyebrow{
    text-align:center;
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--marigold);
    margin-bottom:10px;
  }
  .brandline{
    text-align:center;
    font-family:'Anton', sans-serif;
    font-size:clamp(28px,7vw,40px);
    letter-spacing:.01em;
    margin:0 0 26px;
    color:var(--ink);
    text-transform:uppercase;
  }
  .brandline span{color:var(--marigold);}

  .ticket{
    position:relative;
    background:var(--card);
    border-radius:20px;
    padding:34px 28px 24px;
    overflow:hidden;
  }
  .ticket::before, .ticket::after{
    content:"";
    position:absolute;
    width:28px; height:28px;
    background:var(--hole);
    border-radius:50%;
    top:50%;
    transform:translateY(-50%);
  }
  .ticket::before{left:-14px;}
  .ticket::after{right:-14px;}

  .stub-label{
    text-align:center;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:.2em;
    text-transform:uppercase;
    color:var(--ink-dim);
    margin-bottom:18px;
  }

  .stage{
    min-height:100px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:0 4px;
  }
  .stage p{
    margin:0;
    font-family:'Anton', sans-serif;
    font-size:clamp(20px,5.4vw,26px);
    line-height:1.28;
    letter-spacing:.005em;
    text-transform:none;
  }
  .stage p.flicker{color:var(--ink-dim); opacity:.55;}
  .stage p.settled{color:var(--ink);}
  .stage .placeholder{
    font-family:'Work Sans', sans-serif;
    font-weight:400;
    font-size:15px;
    color:var(--ink-dim);
  }

  .perforation{
    border-top:2px dashed var(--card-edge);
    margin:20px 0 16px;
  }

  .cta-row{display:flex; justify-content:center; margin-bottom:6px;}
  button.draw{
    font-family:'IBM Plex Mono', monospace;
    font-size:13px;
    letter-spacing:.12em;
    text-transform:uppercase;
    background:var(--marigold);
    color:#3A2603;
    border:none;
    border-radius:999px;
    padding:13px 30px;
    cursor:pointer;
    transition:transform .12s ease, background .12s ease;
  }
  button.draw:hover{background:var(--marigold-dim);}
  button.draw:active{transform:scale(.97);}
  button.draw:focus-visible{outline:2px solid var(--coral); outline-offset:2px;}
  button.draw:disabled{opacity:.5; cursor:default;}

  /* Zone réponse anonyme */
  .answer-zone{
    margin-top:18px;
    display:none;
  }
  .answer-zone.active{display:block;}
  .answer-zone label{
    display:block;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--ink-dim);
    margin-bottom:8px;
  }
  .answer-row{display:flex; gap:8px;}
  .answer-row input{
    flex:1;
    background:var(--bg);
    border:1px solid var(--card-edge);
    color:var(--ink);
    border-radius:8px;
    padding:10px 12px;
    font-family:'Work Sans', sans-serif;
    font-size:14px;
  }
  .answer-row input:focus{outline:none; border-color:var(--marigold-dim);}
  .answer-row button{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing:.06em;
    text-transform:uppercase;
    background:var(--coral);
    color:#3A0F09;
    border:none;
    border-radius:8px;
    padding:0 16px;
    cursor:pointer;
    white-space:nowrap;
  }
  .answer-row button:disabled{opacity:.5; cursor:default;}
  .anon-note{
    font-size:11px;
    color:var(--ink-dim);
    margin-top:8px;
    line-height:1.5;
  }
  .match-result{
    margin-top:14px;
    background:var(--bg);
    border:1px solid var(--card-edge);
    border-radius:10px;
    padding:12px 14px;
    font-size:14px;
    line-height:1.5;
    display:none;
  }
  .match-result.show{display:block;}
  .match-result strong{color:var(--marigold);}

  .footer{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
    margin-top:22px;
  }
  .ticket-no{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--ink-dim);
    letter-spacing:.06em;
  }
  .qr-box{
    background:#fff;
    padding:6px;
    border-radius:8px;
    line-height:0;
  }
  .qr-box img, .qr-box canvas{display:block; width:64px; height:64px;}

  .hint{
    text-align:center;
    font-size:12px;
    color:var(--ink-dim);
    margin-top:16px;
    line-height:1.5;
  }

  @media (prefers-reduced-motion: reduce){
    .stage p{transition:none !important;}
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="eyebrow">Tirage du jour</div>
  <h1 class="brandline">Ton <span>quotidien</span> en question</h1>

  <div class="ticket">
    <div class="stub-label">Question du jour</div>
    <div class="stage" id="stage">
      <p class="placeholder" id="stageText">Appuie sur « tirer une question » pour démarrer.</p>
    </div>

    <div class="answer-zone" id="answerZone">
      <label for="answerInput">Ta réponse, en toute anonymité</label>
      <div class="answer-row">
        <input id="answerInput" type="text" maxlength="80" placeholder="Écris ta réponse ici...">
        <button id="sendBtn">Envoyer</button>
      </div>
      <div class="anon-note">Aucun nom, aucune donnée personnelle n'est enregistrée — seule ta réponse est comparée aux autres.</div>
      <div class="match-result" id="matchResult"></div>
    </div>

    <div class="perforation"></div>
    <div class="cta-row">
      <button class="draw" id="drawBtn">Tirer une question</button>
    </div>
    <div class="footer">
      <div class="ticket-no" id="ticketNo">N° ————</div>
      <div class="qr-box" id="qrBox"></div>
    </div>
  </div>

  <p class="hint">Scanne ce code pour rejouer et tirer une nouvelle question à tout moment.</p>
</div>

<script>
(function(){
  // ================= CONFIGURATION FIREBASE =================
  // Remplace ces valeurs par celles de TON projet Firebase
  // (Console Firebase → Paramètres du projet → Tes applications → SDK).
  // Ces clés sont publiques par nature pour une app web Firebase :
  // ce n'est pas un secret comme une clé API classique.
  var firebaseConfig = {
    apiKey: "AIzaSyCnIBQC5qUMrWwlzr0AOjMYPhkgcpKcPT0",
    authDomain: "tiraga-quotidiant.firebaseapp.com",
    databaseURL: "https://tiraga-quotidiant-default-rtdb.firebaseio.com",
    projectId: "tiraga-quotidiant",
    storageBucket: "tiraga-quotidiant.firebasestorage.app",
    messagingSenderId: "335264517260",
    appId: "1:335264517260:web:6a5263528e2b160f577fa9",
    measurementId: "G-9MVDGPRQP7"
  };
  var db = null;
  var firebaseReady = false;
  try{
    if(firebaseConfig.apiKey !== "REMPLACE_MOI"){
      firebase.initializeApp(firebaseConfig);
      db = firebase.firestore();
      firebaseReady = true;
    }
  }catch(e){ firebaseReady = false; }
  // =============================================================

  // ---------- Banque de questions sur le quotidien ----------
  var QUESTIONS = [
    "Quelle est la première chose que tu fais en te réveillant ?",
    "À quelle heure de la journée es-tu le plus en forme ?",
    "Quel petit rituel du matin tu ne sautes jamais ?",
    "Quel est ton plat préféré quand tu manques de temps pour cuisiner ?",
    "Quelle habitude aimerais-tu enfin adopter cette année ?",
    "Comment tu te déplaces le plus souvent au quotidien ?",
    "Quel bruit du quotidien te dérange le plus ?",
    "Quel est ton moment préféré de la journée, et pourquoi ?",
    "Qu'est-ce qui te fait toujours sourire, même un mauvais jour ?",
    "Quelle appli regardes-tu le plus sur ton téléphone chaque jour ?",
    "Si tu avais une heure de libre en plus par jour, tu en ferais quoi ?",
    "Quel est le dernier truc qui t'a fait rire aujourd'hui ?",
    "Quelle est ta boisson du quotidien : café, thé, jus, ou autre chose ?",
    "Quel est ton snack préféré pour tenir l'après-midi ?",
    "Qu'est-ce qui te motive à sortir du lit le matin ?",
    "Quelle chanson tu écoutes en boucle en ce moment ?",
    "Comment tu décompresses après une journée chargée ?",
    "Quel est ton endroit préféré dans ta ville pour te poser ?",
    "Quelle est la dernière chose que tu as apprise sur toi-même ?",
    "Quel petit plaisir tu t'offres après une bonne journée ?",
    "Quelle est ta manière préférée de passer un dimanche ?",
    "Qu'est-ce que tu fais en premier quand tu rentres chez toi ?",
    "Quel est ton moyen de transport préféré, et pourquoi ?",
    "Quelle est la tâche du quotidien que tu détestes le plus ?",
    "Quel est ton repas préféré de la journée : petit-déj, déjeuner ou dîner ?",
    "Quelle habitude de ton entourage t'inspire au quotidien ?",
    "Quel est le dernier message qui t'a fait plaisir aujourd'hui ?",
    "Quelle activité te fait complètement oublier le temps qui passe ?",
    "Quel est ton juron ou ton mot préféré quand ça ne va pas ?",
    "Comment s'appelle la personne que tu appelles en premier quand il y a une bonne nouvelle ?",
    "Quel est ton objectif du jour, même tout petit ?",
    "Quel bruit ou odeur te rappelle immédiatement chez toi ?",
    "Quelle est la dernière série ou vidéo que tu as regardée ?",
    "Quel est ton talent caché que peu de gens connaissent ?",
    "Quelle est la première application que tu ouvres le matin ?",
    "Quel est ton style pour t'habiller un jour normal ?",
    "Quelle est la dernière fois que tu as aidé quelqu'un aujourd'hui ?",
    "Quel est ton moment de solitude préféré dans la journée ?",
    "Quelle est ta petite victoire de la semaine ?",
    "Quel est l'endroit où tu passes le plus de temps chaque jour ?",
    "Quelle est la chose la plus utile que tu as dans ton sac ou tes poches ?",
    "Quel est ton plus grand distrayant pendant que tu travailles ou étudies ?",
    "Quelle est la dernière chose pour laquelle tu as été reconnaissant(e) ?",
    "Quel est ton moment préféré pour appeler ou parler à tes proches ?",
    "Quelle habitude du quotidien tu changerais si tu pouvais ?",
    "Quel est ton petit luxe du quotidien ?",
    "Quelle est la dernière chose qui t'a surpris(e) aujourd'hui ?",
    "Quel est ton mot d'ordre pour bien commencer la journée ?",
    "Quelle est la routine que tu suis religieusement chaque soir ?",
    "Quel est le détail du quotidien que tu ne changerais pour rien au monde ?"
  ];

  var qrTarget = document.getElementById('qrBox');
  function renderQR(){
    qrTarget.innerHTML = '';
    try{
      new QRCode(qrTarget, {
        text: window.location.href,
        width: 64,
        height: 64,
        colorDark: '#1F1730',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
    }catch(e){
      qrTarget.innerHTML = '<span style="font-size:9px;color:#1F1730;">QR indisponible</span>';
    }
  }
  renderQR();

  var drawBtn = document.getElementById('drawBtn');
  var stage = document.getElementById('stage');
  var ticketNo = document.getElementById('ticketNo');
  var answerZone = document.getElementById('answerZone');
  var answerInput = document.getElementById('answerInput');
  var sendBtn = document.getElementById('sendBtn');
  var matchResult = document.getElementById('matchResult');

  var currentQId = null;

  function escapeHtml(s){
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function newTicketNumber(){
    var n = Math.floor(100000 + Math.random()*899999);
    ticketNo.textContent = 'N° ' + n;
  }

  // Sac à tirage sans répétition tant que la banque n'est pas épuisée
  var bag = [];
  var bagIndexes = [];
  function refillBag(){
    bagIndexes = QUESTIONS.map(function(_, i){ return i; });
    for(var i = bagIndexes.length - 1; i > 0; i--){
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = bagIndexes[i]; bagIndexes[i] = bagIndexes[j]; bagIndexes[j] = tmp;
    }
  }
  function drawIndexFromBag(){
    if(bagIndexes.length === 0){ refillBag(); }
    return bagIndexes.pop();
  }

  var flickerWords = ['?','·','—','?','·','—'];
  var flickerTimer = null;

  function normalizeAnswer(s){
    return s
      .toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9\s]/g, '')
      .replace(/\s+/g, ' ')
      .trim();
  }

  function resetAnswerZone(){
    answerInput.value = '';
    answerInput.disabled = false;
    sendBtn.disabled = false;
    matchResult.classList.remove('show');
    matchResult.innerHTML = '';
    answerZone.classList.add('active');
  }

  function drawQuestion(){
    drawBtn.disabled = true;
    answerZone.classList.remove('active');
    stage.innerHTML = '<p class="flicker" id="flickerP"></p>';
    var el = document.getElementById('flickerP');
    var i = 0;
    flickerTimer = setInterval(function(){
      el.textContent = flickerWords[i % flickerWords.length];
      i++;
    }, 80);

    newTicketNumber();
    renderQR();

    var qIndex = drawIndexFromBag();
    currentQId = qIndex;
    var question = QUESTIONS[qIndex];

    setTimeout(function(){
      clearInterval(flickerTimer);
      stage.innerHTML = '<p class="settled">' + escapeHtml(question) + '</p>';
      drawBtn.disabled = false;
      resetAnswerZone();
    }, 650);
  }

  async function sendAnswer(){
    var raw = answerInput.value.trim();
    if(!raw || currentQId === null) return;

    if(!firebaseReady){
      matchResult.innerHTML = "Le partage anonyme n'est pas encore activé sur ce site (configuration en attente).";
      matchResult.classList.add('show');
      return;
    }

    var key = normalizeAnswer(raw);
    if(!key){
      matchResult.innerHTML = 'Réponse trop courte pour être comparée, réessaie.';
      matchResult.classList.add('show');
      return;
    }

    sendBtn.disabled = true;
    answerInput.disabled = true;
    matchResult.innerHTML = 'Comparaison en cours…';
    matchResult.classList.add('show');

    try{
      var col = db.collection('answers');
      var snap = await col
        .where('qId', '==', currentQId)
        .where('key', '==', key)
        .get();

      var matchCount = snap.size;

      await col.add({
        qId: currentQId,
        key: key,
        answer: raw.slice(0, 80),
        ts: firebase.firestore.FieldValue.serverTimestamp()
      });

      if(matchCount > 0){
        matchResult.innerHTML = '🔗 <strong>' + matchCount + '</strong> autre' + (matchCount > 1 ? 's' : '') +
          ' personne' + (matchCount > 1 ? 's ont' : ' a') + ' répondu comme toi à cette question.';
      } else {
        matchResult.innerHTML = "Tu es la première personne à répondre ainsi à cette question — ta réponse est maintenant enregistrée anonymement pour les prochains passages.";
      }
    }catch(err){
      matchResult.innerHTML = "La comparaison n'a pas pu aboutir, réessaie dans un instant.";
      sendBtn.disabled = false;
      answerInput.disabled = false;
    }
  }

  drawBtn.addEventListener('click', drawQuestion);
  sendBtn.addEventListener('click', sendAnswer);
  answerInput.addEventListener('keydown', function(e){
    if(e.key === 'Enter'){ sendAnswer(); }
  });
})();
</script>

</body>
</html>
