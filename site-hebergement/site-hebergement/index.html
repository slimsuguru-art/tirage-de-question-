<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tirage — jeu-concours</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --bg:#1F1730;
    --card:#2A2140;
    --card-edge:#352A4D;
    --marigold:#F4B740;
    --marigold-dim:#D9A233;
    --coral:#FF6B5B;
    --ink:#F3ECE0;
    --ink-dim:#B6A8CE;
    --hole:#1F1730;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Work Sans', sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 16px;
  }
  .wrap{width:100%; max-width:460px;}
  .eyebrow{
    text-align:center;
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--marigold);
    margin-bottom:10px;
  }
  .brandline{
    text-align:center;
    font-family:'Anton', sans-serif;
    font-size:clamp(28px,7vw,40px);
    letter-spacing:.01em;
    margin:0 0 26px;
    color:var(--ink);
    text-transform:uppercase;
  }
  .brandline span{color:var(--marigold);}

  .settings{
    background:var(--card);
    border:1px solid var(--card-edge);
    border-radius:14px;
    padding:14px 16px;
    margin-bottom:18px;
  }
  .settings summary{
    cursor:pointer;
    font-size:13px;
    color:var(--ink-dim);
    list-style:none;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .settings summary::-webkit-details-marker{display:none;}
  .settings summary::after{content:"réglages ▾"; font-family:'IBM Plex Mono',monospace; letter-spacing:.05em;}
  .settings[open] summary::after{content:"réglages ▴";}
  .settings-body{margin-top:14px; display:flex; flex-direction:column; gap:10px;}
  .settings-body label{font-size:12px; color:var(--ink-dim); font-family:'IBM Plex Mono',monospace; letter-spacing:.04em;}
  .settings-body input, .settings-body textarea{
    width:100%;
    background:var(--bg);
    border:1px solid var(--card-edge);
    color:var(--ink);
    border-radius:8px;
    padding:9px 10px;
    font-family:'Work Sans', sans-serif;
    font-size:14px;
    resize:vertical;
  }
  .settings-body input:focus, .settings-body textarea:focus{outline:none; border-color:var(--marigold-dim);}

  .ticket{
    position:relative;
    background:var(--card);
    border-radius:20px;
    padding:34px 28px 24px;
    overflow:hidden;
  }
  .ticket::before, .ticket::after{
    content:"";
    position:absolute;
    width:28px; height:28px;
    background:var(--hole);
    border-radius:50%;
    top:50%;
    transform:translateY(-50%);
  }
  .ticket::before{left:-14px;}
  .ticket::after{right:-14px;}

  .stub-label{
    text-align:center;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:.2em;
    text-transform:uppercase;
    color:var(--ink-dim);
    margin-bottom:18px;
  }

  .stage{
    min-height:132px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:0 4px;
  }
  .stage p{
    margin:0;
    font-family:'Anton', sans-serif;
    font-size:clamp(20px,5.4vw,26px);
    line-height:1.28;
    letter-spacing:.005em;
    text-transform:none;
  }
  .stage p.flicker{color:var(--ink-dim); opacity:.55;}
  .stage p.settled{color:var(--ink);}
  .stage .placeholder{
    font-family:'Work Sans', sans-serif;
    font-weight:400;
    font-size:15px;
    color:var(--ink-dim);
  }

  .perforation{
    border-top:2px dashed var(--card-edge);
    margin:22px 0 18px;
  }

  .cta-row{display:flex; justify-content:center; margin-bottom:6px;}
  button.draw{
    font-family:'IBM Plex Mono', monospace;
    font-size:13px;
    letter-spacing:.12em;
    text-transform:uppercase;
    background:var(--marigold);
    color:#3A2603;
    border:none;
    border-radius:999px;
    padding:13px 30px;
    cursor:pointer;
    transition:transform .12s ease, background .12s ease;
  }
  button.draw:hover{background:var(--marigold-dim);}
  button.draw:active{transform:scale(.97);}
  button.draw:disabled{opacity:.6; cursor:default;}
  button.draw:focus-visible{outline:2px solid var(--coral); outline-offset:2px;}

  .error{
    text-align:center;
    font-size:13px;
    color:var(--coral);
    margin-top:10px;
    min-height:16px;
  }

  .footer{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
    margin-top:6px;
  }
  .ticket-no{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--ink-dim);
    letter-spacing:.06em;
  }
  .qr-box{
    background:#fff;
    padding:6px;
    border-radius:8px;
    line-height:0;
  }
  .qr-box img, .qr-box canvas{display:block; width:64px; height:64px;}

  .hint{
    text-align:center;
    font-size:12px;
    color:var(--ink-dim);
    margin-top:16px;
    line-height:1.5;
  }

  @media (prefers-reduced-motion: reduce){
    .stage p{transition:none !important;}
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="eyebrow">Jeu-concours</div>
  <h1 class="brandline" id="brandline">Tentez votre <span>chance</span></h1>

  <details class="settings" id="settingsPanel">
    <summary>Personnaliser le tirage</summary>
    <div class="settings-body">
      <div>
        <label for="brandInput">Nom de la marque</label>
        <input id="brandInput" type="text" placeholder="ex. Bizap, Maison Kadi..." value="">
      </div>
      <div>
        <label for="themeInput">Thème / contexte du jeu (optionnel)</label>
        <textarea id="themeInput" rows="2" placeholder="ex. jus de bissap, ambiance festive, public jeune, 200ml offerts au gagnant"></textarea>
      </div>
      <div>
        <label for="mechanicInput">Mécanique d'engagement (optionnel)</label>
        <input id="mechanicInput" type="text" placeholder="ex. répondre en commentaire pour tenter de gagner">
      </div>
    </div>
  </details>

  <div class="ticket">
    <div class="stub-label">Question du jour</div>
    <div class="stage" id="stage">
      <p class="placeholder" id="stageText">Appuie sur « tirer une question » pour démarrer le jeu.</p>
    </div>
    <div class="perforation"></div>
    <div class="cta-row">
      <button class="draw" id="drawBtn">Tirer une question</button>
    </div>
    <div class="error" id="errorMsg"></div>
    <div class="footer">
      <div class="ticket-no" id="ticketNo">N° ————</div>
      <div class="qr-box" id="qrBox"></div>
    </div>
  </div>

  <p class="hint">Scanne ce code pour rejouer et tirer une nouvelle question à tout moment.</p>
</div>

<script>
(function(){
  var qrTarget = document.getElementById('qrBox');
  function renderQR(){
    qrTarget.innerHTML = '';
    try{
      new QRCode(qrTarget, {
        text: window.location.href,
        width: 64,
        height: 64,
        colorDark: '#1F1730',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
    }catch(e){
      qrTarget.innerHTML = '<span style="font-size:9px;color:#1F1730;">QR indisponible</span>';
    }
  }
  renderQR();

  var brandInput = document.getElementById('brandInput');
  var themeInput = document.getElementById('themeInput');
  var mechanicInput = document.getElementById('mechanicInput');
  var brandline = document.getElementById('brandline');
  var drawBtn = document.getElementById('drawBtn');
  var stage = document.getElementById('stage');
  var stageText = document.getElementById('stageText');
  var errorMsg = document.getElementById('errorMsg');
  var ticketNo = document.getElementById('ticketNo');

  function updateBrandline(){
    var brand = brandInput.value.trim();
    brandline.innerHTML = brand
      ? 'Le jeu <span>' + escapeHtml(brand) + '</span>'
      : 'Tentez votre <span>chance</span>';
  }
  function escapeHtml(s){
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }
  brandInput.addEventListener('input', updateBrandline);

  function newTicketNumber(){
    var n = Math.floor(100000 + Math.random()*899999);
    ticketNo.textContent = 'N° ' + n;
  }

  var flickerWords = ['?','·','—','?','·','—'];
  var flickerTimer = null;
  function startFlicker(){
    stage.innerHTML = '<p class="flicker" id="flickerP"></p>';
    var el = document.getElementById('flickerP');
    var i = 0;
    flickerTimer = setInterval(function(){
      el.textContent = flickerWords[i % flickerWords.length];
      i++;
    }, 80);
  }
  function stopFlicker(finalText){
    clearInterval(flickerTimer);
    stage.innerHTML = '<p class="settled">' + escapeHtml(finalText) + '</p>';
  }

  async function drawQuestion(){
    errorMsg.textContent = '';
    drawBtn.disabled = true;
    startFlicker();
    newTicketNumber();
    renderQR();

    var brand = brandInput.value.trim() || 'la marque';
    var theme = themeInput.value.trim();
    var mechanic = mechanicInput.value.trim();

    try{
      var response = await fetch("/api/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ brand: brand, theme: theme, mechanic: mechanic })
      });
      if(!response.ok){ throw new Error('request failed'); }
      var data = await response.json();
      var question = (data.question || '').trim();
      if(!question){ throw new Error('empty'); }

      setTimeout(function(){
        stopFlicker(question);
        drawBtn.disabled = false;
      }, 650);
    }catch(err){
      clearInterval(flickerTimer);
      stage.innerHTML = '<p class="placeholder" id="stageText">La question n\\'a pas pu être générée.</p>';
      errorMsg.textContent = 'Réessaie dans un instant.';
      drawBtn.disabled = false;
    }
  }

  drawBtn.addEventListener('click', drawQuestion);
})();
</script>

</body>
</html>
